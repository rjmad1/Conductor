server:
  port: 8084

spring:
  application:
    name: customer-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/conductor_db}
    username: ${SPRING_DATASOURCE_USERNAME:conductor}
    password: ${SPRING_DATASOURCE_PASSWORD:conductor_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

nats:
  server-url: ${NATS_SERVER_URL:nats://localhost:4222}

keycloak:
  server-url: ${KEYCLOAK_SERVER_URL:http://localhost:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      service: customer-service
