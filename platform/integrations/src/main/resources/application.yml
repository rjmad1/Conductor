server:
  port: 8087

spring:
  application:
    name: connector-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/conductor_db}
    username: ${SPRING_DATASOURCE_USERNAME:conductor}
    password: ${SPRING_DATASOURCE_PASSWORD:conductor_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

keycloak:
  server-url: ${KEYCLOAK_SERVER_URL:http://localhost:8080}
  admin:
    username: ${KEYCLOAK_ADMIN_USERNAME:admin}
    password: ${KEYCLOAK_ADMIN_PASSWORD:admin_password}

nats:
  server-url: ${NATS_SERVER_URL:nats://localhost:4222}

integration:
  proxy:
    enabled: ${INTEGRATION_PROXY_ENABLED:false}
    host: ${INTEGRATION_PROXY_HOST:localhost}
    port: ${INTEGRATION_PROXY_PORT:3128}

connector:
  health:
    connect-timeout-ms: ${CONNECTOR_HEALTH_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${CONNECTOR_HEALTH_READ_TIMEOUT_MS:3000}
  shopify:
    health-url: ${SHOPIFY_HEALTH_URL:https://status.shopify.com/api/v2/status.json}
  razorpay:
    health-url: ${RAZORPAY_HEALTH_URL:https://api.razorpay.com/}
  zoho:
    health-url: ${ZOHO_HEALTH_URL:https://accounts.zoho.com/}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true
  endpoint:
    health:
      show-details: when_authorized
      group:
        readiness:
          include: readinessState,connector
  metrics:
    tags:
      service: connector-service
