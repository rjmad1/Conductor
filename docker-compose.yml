services:
  postgres:
    image: postgres:15-alpine
    container_name: conductor-postgres
    networks:
      - conductor-net
    environment:
      POSTGRES_USER: conductor
      POSTGRES_PASSWORD: conductor_password
      POSTGRES_DB: conductor_db
    ports:
      - "15432:5432"
    volumes:
      - conductor_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conductor -d conductor_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.24.0
    container_name: conductor-temporal
    networks:
      - conductor-net
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=conductor
      - POSTGRES_PWD=conductor_password
      - POSTGRES_SEEDS=postgres
    ports:
      - "17233:7233"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 7233 || nc -z $$(hostname -i) 7233"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  workflow-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: conductor-workflow-service
    networks:
      - conductor-net
    ports:
      - "8090:8090"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/conductor_db
      - SPRING_DATASOURCE_USERNAME=conductor
      - SPRING_DATASOURCE_PASSWORD=conductor_password
      - TEMPORAL_SERVICE_ADDRESS=temporal:7233
      - NATS_SERVER_URL=nats://localhost:4222
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_FLYWAY_ENABLED=true
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8090/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

networks:
  conductor-net:
    name: conductor-net
    driver: bridge

volumes:
  conductor_postgres_data:
