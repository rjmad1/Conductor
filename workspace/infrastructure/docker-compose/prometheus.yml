global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'nats'
    static_configs:
      - targets: ['nats:8222']

  - job_name: 'temporal'
    static_configs:
      - targets: ['temporal:8077']

  - job_name: 'qdrant'
    static_configs:
      - targets: ['qdrant:6333']
