version: '3.8'

services:
  # --- Tier 1: Relational & Cache Core ---
  postgres:
    image: postgres:15-alpine
    container_name: conductor-postgres
    environment:
      POSTGRES_USER: conductor
      POSTGRES_PASSWORD: conductor_password
      POSTGRES_DB: conductor_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conductor -d conductor_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: conductor-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: conductor-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  qdrant:
    image: qdrant/qdrant:v1.10.0
    container_name: conductor-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Tier 2: Middleware & Auth ---
  nats:
    image: nats:2.10-alpine
    container_name: conductor-nats
    command: "-js -p 4222"
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "4222"]
      interval: 5s
      timeout: 3s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    container_name: conductor-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin_password
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres/conductor_db
      KC_DB_USERNAME: conductor
      KC_DB_PASSWORD: conductor_password
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e \"GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && cat <&3 | grep -q \"200 OK\""]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.24.0
    container_name: conductor-temporal
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=conductor
      - POSTGRES_PWD=conductor_password
      - POSTGRES_SEEDS=postgres
    ports:
      - "7233:7233"
      - "8233:8233"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "7233"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Tier 3: Gateway & Connected Platforms ---
  kong:
    image: kong:3.7-alpine
    container_name: conductor-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8000, 0.0.0.0:8443 ssl http2"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001, 0.0.0.0:8444 ssl"
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8443:8443"
    volumes:
      - ./kong.yml:/usr/local/kong/declarative/kong.yml
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 5s
      timeout: 3s
      retries: 5

  metabase:
    image: metabase/metabase:v0.49.0
    container_name: conductor-metabase
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: conductor_db
      MB_DB_PORT: 5432
      MB_DB_USER: conductor
      MB_DB_PASS: conductor_password
      MB_DB_HOST: postgres
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  dify:
    image: langgenius/dify-api:0.6.9
    container_name: conductor-dify
    environment:
      - CONSOLE_API_URL=http://localhost:5001
      - DB_USERNAME=conductor
      - DB_PASSWORD=conductor_password
      - DB_HOST=postgres
      - DB_DATABASE=conductor_db
      - REDIS_HOST=redis
      - VECTOR_STORE=qdrant
      - QDRANT_HOST=qdrant
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  activepieces:
    image: activepieces/activepieces:0.20.0
    container_name: conductor-activepieces
    environment:
      - AP_ENGINE_EXECUTOR_MODE=SANDBOXED
      - AP_ENVIRONMENT=DEVELOPMENT
      - AP_POSTGRES_DATABASE=conductor_db
      - AP_POSTGRES_HOST=postgres
      - AP_POSTGRES_USERNAME=conductor
      - AP_POSTGRES_PASSWORD=conductor_password
      - AP_REDIS_URL=redis://redis:6379
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- Tier 4: Monitoring ---
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: conductor-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:10.4.0
    container_name: conductor-grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:
  qdrant_data:
